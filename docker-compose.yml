services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: pass
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - 5432:5432
  keycloak:
    image: quay.io/keycloak/keycloak
    command: "start-dev"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - 8081:8080
volumes:
  pgdata:
    