version: "2"

linters:
  default: standard        # errcheck, govet, staticcheck, ineffassign, unused
  enable:
    - revive               # style/lint rules (the modern golint replacement)
    - errorlint            # catches wrong error wrapping/comparison
    - bodyclose            # unclosed HTTP response bodies
    - gosec                # common security issues
  exclusions:
    rules:
      - path: _test\.go    # relax a couple of rules in tests
        linters: [gosec]
      - text: "G114"           # just testing suppress
        linters: [gosec]
      - text: "exported .* should have comment" # no need for local playaround
        linters: [revive]
      - text: ".* should have a package comment" # no need for local playaround
        linters: [revive]

formatters:
  enable:
    - gofmt
    - goimports